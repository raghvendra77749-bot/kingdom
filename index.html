<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | ROYAL EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --premium-gold: linear-gradient(135deg, #ffcc00 0%, #fff3a0 50%, #ffcc00 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 80%);
            z-index: -1;
        }

        header { margin-top: 60px; text-align: center; }
        h1 {
            font-family: 'Cinzel', serif; font-size: 4rem; margin: 0;
            background: var(--premium-gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 204, 0, 0.3));
            letter-spacing: 8px; font-weight: 900;
        }

        /* Top Rank Stage */
        .stage {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 20px; margin: 60px 0; width: 95%; max-width: 1100px;
        }

        .throne {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 35px 20px;
            text-align: center; transition: 0.5s;
            position: relative; flex: 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Rank 1 Running Border Effect */
        .rank-1 { height: 430px; order: 2; z-index: 2; border: none; overflow: hidden; }
        .rank-1::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate 4s linear infinite; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .rank-1-inner { position: absolute; inset: 4px; background: #0a0a0a; border-radius: 36px; z-index: -1; }

        .rank-2 { height: 320px; order: 3; }
        .rank-3 { height: 320px; order: 1; }

        .throne:hover { transform: translateY(-15px); border-color: #fff; }

        /* Nexus Style Name */
        .nexus-style {
            font-family: 'Cinzel', serif; font-weight: 900;
            font-size: 42px !important;
            background: var(--premium-gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--gold));
            text-transform: uppercase; margin: 10px 0 0 0 !important;
        }

        .spikes {
            width: 100%; max-width: 280px; margin-top: -15px;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .king-name-std { font-family: 'Cinzel'; font-size: 22px; color: #fff; margin: 15px 0; }

        .claim-btn {
            background: var(--premium-gold); color: #000; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: 900;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .claim-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }

        /* Members Sections */
        .members-section { width: 90%; max-width: 1100px; margin-top: 50px; }
        .cat-title { 
            font-family: 'Cinzel'; color: var(--gold); 
            border-bottom: 2px solid rgba(255,204,0,0.2); 
            padding-bottom: 10px; margin-bottom: 30px; 
            letter-spacing: 3px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 60px; }
        .slot {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px; border-radius: 20px; text-align: center;
            color: #777; transition: 0.3s; cursor: pointer;
        }
        .slot:hover { border-color: #fff; color: #fff; transform: scale(1.05); background: rgba(255,255,255,0.1); }

        /* Popup */
        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0a; padding: 40px; border-radius: 25px; border: 1px solid var(--gold);
            z-index: 1000; text-align: center; box-shadow: 0 0 100px #000;
        }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin: 20px 0; }

        @media (max-width: 768px) {
            .stage { flex-direction: column; align-items: center; }
            .throne { width: 90%; height: auto !important; order: unset !important; margin-bottom: 20px;}
            h1 { font-size: 2.8rem; }
            .nexus-style { font-size: 32px !important; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="letter-spacing: 10px; font-size: 12px; color: var(--gold); opacity: 0.5;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3" id="t3">
            <span style="font-size: 40px; filter: drop-shadow(0 0 10px var(--bronze));">🥉</span>
            <div class="king-name-std" id="name3">EMPTY THRONE</div>
            <button class="claim-btn" onclick="openPopup(3)">CLAIM</button>
        </div>

        <div class="throne rank-1" id="t1">
            <div class="rank-1-inner"></div>
            <span style="font-size: 60px; filter: drop-shadow(0 0 20px var(--gold));">👑</span>
            <div class="nexus-style" id="name1">SUPREME KING</div>
            <svg class="spikes" viewBox="0 0 320 100">
                <path d="M160,10 L180,40 L160,25 L140,40 Z" fill="white"/>
                <path d="M0,55 L40,45 L60,55 L40,65 Z" fill="white"/>
                <path d="M320,55 L280,45 L260,55 L280,65 Z" fill="white"/>
                <path d="M160,100 L180,70 L160,85 L140,70 Z" fill="white"/>
            </svg>
            <button class="claim-btn" onclick="openPopup(1)">CLAIM VIP</button>
        </div>

        <div class="throne rank-2" id="t2">
            <span style="font-size: 40px; filter: drop-shadow(0 0 10px var(--silver));">🥈</span>
            <div class="king-name-std" id="name2">EMPTY THRONE</div>
            <button class="claim-btn" onclick="openPopup(2)">CLAIM</button>
        </div>
    </div>

    <div class="members-section">
        <h2 class="cat-title">GOLD MEMBERS (10 SLOTS)</h2>
        <div class="grid" id="gold-grid"></div>

        <h2 class="cat-title" style="color: var(--silver); border-color: rgba(192,192,192,0.2);">SILVER MEMBERS (15 SLOTS)</h2>
        <div class="grid" id="silver-grid"></div>

        <h2 class="cat-title" style="color: var(--bronze); border-color: rgba(205,127,50,0.2);">BRONZE MEMBERS (20 SLOTS)</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <div id="popup">
        <h3 style="font-family: 'Cinzel'; color: var(--gold);">ENTER YOUR NAME</h3>
        <input type="text" id="userName" placeholder="Your Name...">
        <button class="claim-btn" onclick="saveName()">ASCEND TO THRONE</button>
    </div>

    <script>
        let currentThrone = 0;

        function openPopup(id) {
            currentThrone = id;
            document.getElementById('popup').style.display = 'block';
        }

        function saveName() {
            let name = document.getElementById('userName').value;
            if(!name) return alert("Please enter a name!");
            document.getElementById('name' + currentThrone).innerText = name.toUpperCase();
            document.getElementById('popup').style.display = 'none';
            document.getElementById('userName').value = "";
        }

        function makeGrid(id, count) {
            let grid = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.innerText = 'SLOT ' + i;
                div.onclick = function() {
                    let n = prompt("Enter Name for Slot " + i);
                    if(n) this.innerText = n.toUpperCase();
                };
                grid.appendChild(div);
            }
        }

        // Sab grids ko generate karna
        makeGrid('gold-grid', 10);
        makeGrid('silver-grid', 15);
        makeGrid('bronze-grid', 20);
    </script>
</body>
</html>
