<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | MASTER ADMIN PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
            --glass: rgba(255, 255, 255, 0.05);
            /* Premium Silver Frame (from image) gradients */
            --silver-frame-texture: linear-gradient(135deg, #bbb 0%, #fff 40%, #bbb 60%, #fff 100%);
            --silver-metal-bevel: inset 0 0 10px rgba(0,0,0,0.5), inset 0 0 5px rgba(255,255,255,0.8);
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- MASTER ADMIN PANEL --- */
        .admin-panel {
            position: fixed; bottom: 20px; right: 20px; z-index: 10000;
            background: #111; border: 2px solid var(--gold); padding: 15px;
            border-radius: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; gap: 10px;
            transition: 0.3s;
        }
        .admin-btn {
            background: var(--gold); color: #000; border: none; padding: 10px;
            border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 12px;
            transition: 0.2s;
        }
        .admin-btn:hover { transform: scale(1.05); }
        .edit-active [contenteditable="true"] { border: 1px dashed var(--gold) !important; background: rgba(255,255,255,0.05); cursor: text; }

        /* --- LAYOUT --- */
        header { margin-top: 50px; text-align: center; }
        h1 {
            font-family: 'Cinzel', serif; font-size: 3.5rem; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.4));
            letter-spacing: 5px;
        }

        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 60px 0; width: 95%; max-width: 1100px; }
        
        .throne {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            padding: 30px; text-align: center; flex: 1; transition: 0.5s;
            position: relative;
        }
        .throne:hover { transform: translateY(-15px); border-color: var(--gold); }
        .rank-1 { border: 2px solid var(--gold); height: 380px; order: 2; box-shadow: 0 0 40px rgba(255, 204, 0, 0.15); }

        /* --- SUPREME KING WITH LOGO --- */
        .king-plate {
            display: inline-block; position: relative; margin: 15px auto;
        }
        .king-name-logo {
            font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900;
            color: #fff; margin: 0; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8), 0 0 30px rgba(255, 204, 0, 0.5);
        }
        /* Hidden file input for logo */
        #logo-input { display: none; }
        /* Box where dynamic logo appears */
        .king-dynamic-logo-container {
            width: 150px; height: 150px; margin: 10px auto 20px;
            border-radius: 20px; border: 2px dashed var(--gold);
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .king-dynamic-logo-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .king-dynamic-logo-container .upload-hint { font-size: 10px; color: var(--gold); position: absolute; top: 5px; }

        /* SVG based symmetrical tribal spikes around Rank 1 name (White) */
        .nexus-spikes {
            width: 100%; max-width: 300px; height: auto; display: block; margin: 0 auto; fill: #fff; filter: drop-shadow(0 0 15px var(--gold));
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1;
        }
        
        /* Standard King Names */
        .king-name-std { font-family: 'Cinzel'; font-size: 20px; color: #fff; margin: 15px 0; }
        
        .claim-btn {
            background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .claim-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }

        /* DP Placeholder (Simple Circle) */
        .dp-circle { width: 80px; height: 80px; background: #111; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }

        /* --- MEMBERS SECTIONS & SLOTS --- */
        .members-section { width: 90%; max-width: 1100px; margin-top: 50px; }
        .cat-title { font-family: 'Cinzel'; color: var(--gold); border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 50px; }
        
        .slot {
            padding: 15px; border-radius: 15px; text-align: center; font-size: 14px;
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .slot:hover { transform: scale(1.05); }

        /* --- UPDATED PREMIUM PLATES --- */
        
        /* Premium Gold Engraved Plate */
        .gold-plate-dyn {
            background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            border: 2px solid #5d411b; box-shadow: inset 0 0 5px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.5);
        }
        .gold-plate-dyn .engraved-text { font-family: 'Cinzel'; font-weight: 900; color: #3d2b1f; text-shadow: 1px 1px 1px rgba(255,255,255,0.3); text-transform: uppercase; }

        /* --- NEW: Premium Silver Ornate Frame Plate (from image) --- */
        .silver-ornate-plate-dyn {
            /* Basic metallic structure */
            background: var(--glass);
            border: none;
            overflow: visible; /* To show ornate edges */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin: 10px; /* Space for ornate frame */
        }

        /* SVG based ornate metal frame logic (derived from image) */
        .ornate-metal-frame {
            width: calc(100% + 40px); /* Oversize frame */
            height: calc(100% + 20px);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: -2; /* Behind text and logo */
            fill: #fff; /* White base, texture added via filter */
            /* Add premium metal texture and shadow (bevel from image) */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)) drop-shadow(0 0 5px rgba(255,255,255,0.8)) hue-rotate(210deg) saturate(10%);
        }
        
        .ornate-frame-svg { width: 100%; height: 100%; }

        .silver-ornate-plate-dyn .engraved-text {
            font-family: 'Cinzel'; font-weight: 900; color: #222; /* Darker text */
            text-shadow: 0 0 2px rgba(255,255,255,0.8); /* Bevel effect on text */
            text-transform: uppercase;
        }

        /* Logic for displaying individual logo inside dyn logo slots */
        .dyn-logo-box {
            width: 40px; height: 40px; border-radius: 5px; border: 1px dashed #555;
            cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 5px; z-index: 1; /* Above frame */
        }
        .dyn-logo-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .dyn-logo-box .upload-hint { font-size: 8px; color: var(--gold); }

        /* Popup */
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--gold); z-index: 1000; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,1); }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 100%; margin: 20px 0; }

        /* Hidden inputs */
        input[type="file"] { display: none; }

        @media (max-width: 768px) {
            .stage { flex-direction: column; align-items: center; }
            .throne { width: 90%; height: auto !important; order: unset !important; margin-bottom: 20px; }
            .king-name-logo { font-size: 2.2rem; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <div class="admin-panel" id="admin-panel">
        <div style="color:var(--gold); font-size:10px; font-weight:900; text-align:center;">MASTER CONTROL</div>
        <button class="admin-btn" onclick="enableGlobalEdit()">1. EDIT TEXTS/EMOJIS</button>
        <button class="admin-btn" style="background:#fff; color:#000;" onclick="triggerBulkImage('silver-ornate-plate-dyn')">2. CHANGE ALL SILVER PHOTOS</button>
        <button class="admin-btn" style="background:#fff; color:#000;" onclick="triggerBulkImage('gold-plate-dyn')">3. CHANGE ALL GOLD PHOTOS</button>
        <button class="admin-btn" style="background:#00ff00;" onclick="saveAllSettings()">4. SAVE SETTINGS</button>
    </div>

    <header>
        <h1 id="title" contenteditable="false">THE KINGDOM</h1>
        <p id="tagline" contenteditable="false" style="color:var(--gold); letter-spacing:5px; font-size:12px;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3">
            <span id="emoji3" contenteditable="false" style="font-size: 40px;">🥉</span>
            <div class="dp-circle"><span style="color:#555">DP</span></div>
            <div id="name3" contenteditable="false" style="font-family: 'Cinzel'; margin: 20px 0;">EMPTY</div>
        </div>

        <div class="throne rank-1">
            <span id="emoji1" contenteditable="false" style="font-size: 50px;">👑</span>
            
            <div id="king-logo-box" class="king-dynamic-logo-container" onclick="triggerUploadSingle(this)">
                <span class="upload-hint">UPLOAD KING LOGO</span>
                <img id="king-logo-preview" src="" alt="Logo">
                <input type="file" class="dyn-logo-input" hidden accept="image/*" onchange="previewIndividualLogo(event)">
            </div>
            
            <div class="king-plate" id="name1-plate">
                <div id="name1" contenteditable="false" class="king-name-logo">ANAND GFX</div>
                <svg class="nexus-spikes" viewBox="0 0 320 120">
                    <path d="M160,0 L200,40 L160,20 L120,40 Z" /> <path d="M160,120 L200,80 L160,100 L120,80 Z" /> <path d="M0,60 L40,40 L60,60 L40,80 Z" /> <path d="M320,60 L280,40 L260,60 L280,80 Z" /> <path d="M40,20 L80,0 L60,20 Z" /> <path d="M280,20 L240,0 L260,20 Z" /> <path d="M40,100 L80,120 L60,100 Z" /> <path d="M280,100 L240,120 L260,100 Z" />
                </svg>
            </div>
            
            <div contenteditable="false" style="color:var(--gold);">SUPREME KING</div>
        </div>

        <div class="throne rank-2">
            <span id="emoji2" contenteditable="false" style="font-size: 40px;">🥈</span>
            <div class="dp-circle"><span style="color:#555">DP</span></div>
            <div id="name2" contenteditable="false" style="font-family: 'Cinzel'; margin: 20px 0;">EMPTY</div>
        </div>
    </div>

    <div class="members-section">
        <h2 contenteditable="false" style="color:var(--gold);">GOLD MEMBERS (10 SLOTS)</h2>
        <div class="grid" id="gold-grid"></div>

        <h2 contenteditable="false" style="color:var(--silver);">SILVER MEMBERS (15 SLOTS)</h2>
        <div class="grid" id="silver-grid"></div>
    </div>

    <input type="file" id="bulk-logo-input" hidden accept="image/*" onchange="applyBulkImages(event)">
    <input type="file" id="individual-logo-input" hidden accept="image/*" onchange="applyIndividualLogo(event)">

    <script>
        // --- ADMIN CONTROLS ---
        let currentBulkType = '';
        let currentIndividualTarget = null;

        function enableGlobalEdit() {
            document.body.classList.add('edit-active');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "true");
            alert("Editing Enabled! Ab tum text aur emojis badal sakte ho.");
        }

        function saveAllSettings() {
            document.body.classList.remove('edit-active');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "false");
            alert("Settings Saved Locally! (Bulk Photos are temporary)");
        }

        // --- DYNAMIC IMAGE LOGIC ---

        // Apply bulk background images (GLOBAL Photo)
        function triggerBulkImage(type) {
            currentBulkType = type;
            document.getElementById('bulk-logo-input').click();
        }

        function applyBulkImages(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const slots = document.querySelectorAll(`.${currentBulkType}`);
                slots.forEach(slot => {
                    // Update main slot background
                    slot.style.backgroundImage = `url('${e.target.result}')`;
                    slot.style.backgroundSize = "cover";
                    // Change text color to white for contrast against dark photos
                    slot.querySelector('.engraved-text').style.color = "#fff";
                });
            }
            reader.readAsDataURL(file);
        }

        // Apply individual logo/photo (inside dynamic box or slot)
        function triggerUploadSingle(target) {
            currentIndividualTarget = target;
            document.getElementById('individual-logo-input').click();
        }

        function applyIndividualLogo(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                // If Rank 1 container is clicked, update it
                if(currentIndividualTarget.id === 'king-logo-box') {
                    const img = document.getElementById('king-logo-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    currentIndividualTarget.querySelector('.upload-hint').style.display = 'none';
                    return;
                }

                // If a slot dyn box is clicked, update it
                const img = currentIndividualTarget.querySelector('img');
                const span = currentIndividualTarget.querySelector('.upload-hint');
                if(img) {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(span) span.style.display = 'none';
                }
            }
            reader.readAsDataURL(file);
        }

        // Preview logo in Rank 1 area
        function triggerUploadSingle(target) {
            currentIndividualTarget = target;
            document.getElementById('individual-logo-input').click();
        }

        function makeGrid(id, count, plateClass) {
            let grid = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                let div = document.createElement('div');
                div.className = `slot ${plateClass}-dyn`;
                
                // For dynamic plates, add unique structure with frame or engrave
                if(plateClass === 'silver-ornate') {
                    div.innerHTML = `
                        <div class="ornate-metal-frame">
                            <svg class="ornate-frame-svg" viewBox="0 0 320 120">
                                <path d="M160,0 L200,30 L160,15 L120,30 Z" /> <path d="M160,120 L200,90 L160,105 L120,90 Z" /> <path d="M0,60 L30,50 L40,60 L30,70 Z" /> <path d="M320,60 L290,50 L280,60 L290,70 Z" />
                                <path d="M30,30 L60,10 L50,30 Z" /> <path d="M290,30 L260,10 L270,30 Z" /> <path d="M30,90 L60,110 L50,90 Z" /> <path d="M290,90 L260,110 L270,90 Z" />
                                <path d="M60,0 L100,20 L80,0 Z" /> <path d="M260,0 L220,20 L240,0 Z" /> <path d="M60,120 L100,100 L80,120 Z" /> <path d="M260,120 L220,100 L240,120 Z" />
                                <rect x="30" y="30" width="260" height="60" rx="10" ry="10" />
                            </svg>
                        </div>
                        <div class="dyn-logo-box" onclick="triggerUploadSingle(this)">
                            <img src="" alt="logo">
                            <span class="upload-hint">LOG</span>
                        </div>
                        <span id="${id}-name-${i}" contenteditable="false" class="engraved-text">SLOT ${i}</span>`;
                } else if(plateClass === 'gold-plate') {
                    div.innerHTML = `
                        <div class="dyn-logo-box" onclick="triggerUploadSingle(this)">
                            <img src="" alt="logo">
                            <span class="upload-hint">LOG</span>
                        </div>
                        <span id="${id}-name-${i}" contenteditable="false" class="engraved-text">SLOT ${i}</span>`;
                }

                grid.appendChild(div);
            }
        }

        makeGrid('gold-grid', 10, 'gold-plate');
        // Rename dynamic silver class to premium ornate frame logic
        makeGrid('silver-grid', 15, 'silver-ornate');
    </script>
</body>
</html>
