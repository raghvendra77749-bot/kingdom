<!DOCTYPE html>
<html lang="hi">
<head>

    <title>ANAND GFX | SECRET BOX</title>
    <style>

        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { background: linear-gradient(145deg, #111, #050505); border: 1px solid #222; padding: 40px 20px; border-radius: 30px; max-width: 400px; margin: 50px auto; box-shadow: 0 20px 40px rgba(0,0,0,1); }

        .tag { color: #666; font-size: 12px; margin-bottom: 30px; display: block; }
        textarea { width: 90%; background: #151515; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; font-family: 'Outfit'; font-size: 16px; outline: none; margin-bottom: 20px; }
        .send-btn { background: #fff; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { background: #ff0055; color: #fff; transform: scale(1.05); }
        .footer { margin-top: 50px; font-size: 10px; color: #333; letter-spacing: 2px; }
    </style>
</head>

        <textarea id="msg" rows="4" placeholder="Kuch spicy likho..."></textarea>

    </div>

    <div class="footer">POWERED BY RN COLLECTION | 2026</div>

    <script>
        function send() {
            let m = document.getElementById('msg').value;

            // Yahan hum EmailJS ya simple WhatsApp redirect use kar sakte hain
            alert("Message Sent! Ab screenshot lo aur story pe lagao.");
            document.getElementById('msg').value = "";

</body>
</html>
