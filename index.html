<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32;
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        .admin-bar {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            background: #bc1888; padding: 12px 25px; border-radius: 50px;
            cursor: pointer; font-weight: 900; box-shadow: 0 0 20px rgba(188, 24, 136, 0.6);
            transition: 0.3s;
        }

        header { margin-top: 60px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; color: var(--gold); margin: 0; letter-spacing: 8px; }

        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 50px 0; width: 95%; max-width: 1200px; }
        .throne { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 25px 10px; text-align: center; flex: 1; }
        
        .photo-box { width: 140px; height: 140px; margin: 15px auto; border: 2px dashed #444; border-radius: 20px; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 50px; width: 90%; max-width: 1100px; }
        
        .slot { 
            height: 90px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border-radius: 10px;
            font-family: 'Cinzel', serif; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Original Plate Backgrounds */
        .gold-plate { background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728); color: #3d2b1f; }
        .silver-plate { background: linear-gradient(145deg, #999, #e0e0e0, #777); color: #222; }
        .bronze-plate { background: linear-gradient(145deg, #804a00, #cd7f32, #593300); color: #fff; }

        .slot img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        .slot-text { z-index: 5; width: 100%; text-align: center; outline: none; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="admin-bar" onclick="saveAllData()">SAVE & LOCK</div>

    <header>
        <h1 contenteditable="true" id="main-title">THE KINGDOM</h1>
        <p style="color:var(--gold); letter-spacing:5px;">RAGHAV EDITZ SPECIAL</p>
    </header>

    <div class="stage">
        <div class="throne">🥈<div class="photo-box" id="p2" onclick="openFile(this)"><img src=""><span>UP</span></div><div id="n2" contenteditable="true">EMPTY</div></div>
        <div class="throne" style="border: 2px solid gold;">👑<div class="photo-box" id="p1" style="width:160px; height:160px;" onclick="openFile(this)"><img src=""><span>KING LOGO</span></div><div id="n1" contenteditable="true" style="color:var(--gold);">SUPREME KING</div></div>
        <div class="throne">🥉<div class="photo-box" id="p3" onclick="openFile(this)"><img src=""><span>UP</span></div><div id="n3" contenteditable="true">EMPTY</div></div>
    </div>

    <h2 style="color:var(--gold)">GOLD (10)</h2><div class="grid" id="gold-grid"></div>
    <h2 style="color:var(--silver)">SILVER (15)</h2><div class="grid" id="silver-grid"></div>
    <h2 style="color:var(--bronze)">BRONZE (20)</h2><div class="grid" id="bronze-grid"></div>

    <input type="file" id="file-input" onchange="handleFile(event)">

    <script>
        let target = null;

        function createPlates(boxId, count, type) {
            const container = document.getElementById(boxId);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `slot ${type}`;
                div.id = `${boxId}-${i}`;
                div.innerHTML = `<img id="img-${div.id}"><div class="slot-text" contenteditable="true" id="txt-${div.id}">PLATE ${i}</div>`;
                div.onclick = function(e) { if(e.target.className !== 'slot-text') openFile(this); };
                container.appendChild(div);
            }
        }

        function openFile(el) { target = el; document.getElementById('file-input').click(); }

        function handleFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = target.querySelector('img');
                img.src = ev.target.result;
                img.style.display = 'block';
                if(target.querySelector('span')) target.querySelector('span').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function saveAllData() {
            const data = { texts: {}, imgs: {} };
            document.querySelectorAll('[contenteditable="true"]').forEach(el => data.texts[el.id] = el.innerText);
            document.querySelectorAll('img').forEach(img => {
                if(img.src.includes('data:image')) data.imgs[img.id || img.parentElement.id] = img.src;
            });
            
            try {
                localStorage.setItem('KINGDOM_V4', JSON.stringify(data));
                alert("Bhai, Sab Save Ho Gaya!");
            } catch(e) {
                alert("Error: Photos ka size bahut bada hai, kam photos use karein ya size chhota karein.");
            }
        }

        function loadData() {
            createPlates('gold-grid', 10, 'gold-plate');
            createPlates('silver-grid', 15, 'silver-plate');
            createPlates('bronze-grid', 20, 'bronze-plate');

            const saved = localStorage.getItem('KINGDOM_V4');
            if(!saved) return;
            const data = JSON.parse(saved);

            for(let id in data.texts) if(document.getElementById(id)) document.getElementById(id).innerText = data.texts[id];
            for(let id in data.imgs) {
                let img = document.getElementById(id);
                if(!img) img = document.getElementById(id).querySelector('img');
                if(img) { img.src = data.imgs[id]; img.style.display = 'block'; if(img.parentElement.querySelector('span')) img.parentElement.querySelector('span').style.display = 'none'; }
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
