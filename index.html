<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kingdom | Elite</title>
    <style>
        :root {
            --neon-gold: #ffcf40;
            --neon-blue: #00f2ff;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Kingdom Title Aesthetic */
        .header {
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .divider {
            width: 250px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            margin: 10px auto 40px;
        }

        /* Top 3 Rajas Section */
        .kingdom-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
        }

        .king-box {
            background: var(--card-bg);
            border: 1px solid #333;
            width: 280px;
            padding: 30px 15px;
            border-radius: 15px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .king-box:hover {
            border-color: var(--neon-blue);
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* DP Placeholder */
        .king-dp {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #222;
            margin: 0 auto 15px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .king-dp img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rank-label {
            font-size: 0.8rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .king-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Unlock Button */
        .unlock-btn {
            background: transparent;
            border: 1px solid var(--neon-gold);
            color: var(--neon-gold);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .unlock-btn:hover {
            background: var(--neon-gold);
            color: black;
        }

        .price-tag {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Footer Text */
        .footer-note {
            margin-top: 50px;
            font-style: italic;
            color: #666;
            font-size: 0.9rem;
        }

        .pay-more {
            margin-top: 20px;
            color: var(--neon-blue);
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Special 1st King Style */
        .first-king {
            border-color: var(--neon-gold) !important;
            box-shadow: 0 0 25px rgba(255, 207, 64, 0.15);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KINGDOM</h1>
        <div class="divider"></div>
    </div>

    <div class="kingdom-grid">
        <div class="king-box first-king">
            <div class="rank-label">#01 First King</div>
            <div class="king-dp">
                <span style="color:#444">No DP</span>
            </div>
            <div class="king-name">Anand</div>
            <button class="unlock-btn">OWNED</button>
            <span class="price-tag">Top Ranker</span>
        </div>

        <div class="king-box">
            <div class="rank-label">#02 Second King</div>
            <div class="king-dp">
                <span style="color:#444">?</span>
            </div>
            <div class="king-name">Empty</div>
            <button class="unlock-btn">UNLOCK</button>
            <span class="price-tag">₹ 100</span>
        </div>

        <div class="king-box">
            <div class="rank-label">#03 Third King</div>
            <div class="king-dp">
                <span style="color:#444">?</span>
            </div>
            <div class="king-name">Empty</div>
            <button class="unlock-btn">UNLOCK</button>
            <span class="price-tag">₹ 100</span>
        </div>
    </div>

    <p class="pay-more">If you pay more then you will be First King.</p>
    
    <div class="footer-note">
        The Kingdom change in one week.
    </div>

</body>
</html>
