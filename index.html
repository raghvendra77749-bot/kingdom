<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | ANAND GFX</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32;
            --neon-gold: rgba(255, 204, 0, 0.8);
            --soft-glow: rgba(255, 204, 0, 0.3);
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #222 0%, #000 70%);
            z-index: -1;
        }

        header { margin-top: 50px; text-align: center; }
        h1 {
            font-family: 'Cinzel', serif; font-size: 3.5rem; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--neon-gold));
            letter-spacing: 5px;
        }

        .stage {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 20px; margin: 50px 0; width: 95%; max-width: 1100px;
        }

        .throne {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 25px;
            text-align: center; transition: 0.5s; flex: 1;
        }

        /* --- RANK 1: UNIVERSAL NEXUS STYLE --- */
        .rank-1 { 
            height: 400px; order: 2; border-color: var(--gold); 
            box-shadow: 0 0 30px var(--soft-glow);
        }

        /* Jo bhi King 1 banega uska style */
        .rank-1-nexus {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--gold), 0 0 40px var(--gold);
            display: inline-block;
            position: relative;
        }

        .nexus-spikes {
            width: 100%; max-width: 280px; height: auto;
            fill: #fff;
            filter: drop-shadow(0 0 10px var(--gold));
            margin-top: -10px;
        }

        .subtitle {
            font-size: 12px; color: var(--gold); letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 15px;
        }

        /* Standard Styles */
        .rank-2 { height: 320px; order: 3; }
        .rank-3 { height: 320px; order: 1; }
        .king-name-std { font-family: 'Cinzel'; font-size: 1.5rem; margin: 15px 0; color: #fff; }

        .dp-circle {
            width: 70px; height: 70px; background: #111; border-radius: 50%;
            margin: 0 auto 10px; border: 2px solid #333;
        }

        .claim-btn {
            background: var(--gold); color: #000; border: none;
            padding: 10px 25px; border-radius: 50px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .claim-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }

        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--gold);
            z-index: 1000; text-align: center;
        }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 80%; margin: 15px 0; }

        @media (max-width: 768px) {
            .stage { flex-direction: column; align-items: center; }
            .throne { width: 90%; height: auto !important; margin-bottom: 20px; }
            .rank-1-nexus { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="color: #555; letter-spacing: 5px;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3">
            <span>🥉</span>
            <div class="dp-circle"></div>
            <div class="king-name-std" id="name3">EMPTY</div>
            <button class="claim-btn" onclick="openPopup(3)">CLAIM</button>
        </div>

        <div class="throne rank-1">
            <span>👑</span>
            <div class="dp-circle"></div>
            <div id="name1-container">
                <div class="rank-1-nexus" id="name1">KING NAME</div>
                <div class="subtitle">SUPREME KING</div>
                <svg class="nexus-spikes" viewBox="0 0 320 100">
                    <path d="M160,0 L180,30 L160,15 L140,30 Z" />
                    <path d="M0,50 L30,40 L45,50 L30,60 Z" />
                    <path d="M320,50 L290,40 L275,50 L290,60 Z" />
                    <path d="M160,100 L180,70 L160,85 L140,70 Z" />
                </svg>
            </div>
            <button class="claim-btn" onclick="openPopup(1)">CLAIM</button>
        </div>

        <div class="throne rank-2">
            <span>🥈</span>
            <div class="dp-circle"></div>
            <div class="king-name-std" id="name2">EMPTY</div>
            <button class="claim-btn" onclick="openPopup(2)">CLAIM</button>
        </div>
    </div>

    <div id="popup">
        <h3>ENTER YOUR NAME</h3>
        <input type="text" id="userName" placeholder="Your Name...">
        <br>
        <button class="claim-btn" onclick="saveData()">BETH JAO RAJA!</button>
    </div>

    <script>
        // Firebase Config (Yahan apna data daalna)
        const firebaseConfig = { apiKey: "...", databaseURL: "..." }; 
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentId = 0;

        // Syncing from Database
        db.ref('kings').on('value', (snap) => {
            const val = snap.val() || {};
            document.getElementById('name1').innerText = val.name1 || "EMPTY";
            document.getElementById('name2').innerText = val.name2 || "EMPTY";
            document.getElementById('name3').innerText = val.name3 || "EMPTY";
        });

        function openPopup(id) {
            currentId = id;
            document.getElementById('popup').style.display = 'block';
        }

        function saveData() {
            const name = document.getElementById('userName').value.toUpperCase();
            if(!name) return;
            db.ref('kings/name' + currentId).set(name).then(() => {
                document.getElementById('popup').style.display = 'none';
                document.getElementById('userName').value = "";
            });
        }
    </script>
</body>
</html>
