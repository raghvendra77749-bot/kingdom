<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | PREVIEW</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00;
            --premium-gold: linear-gradient(135deg, #ffcc00 0%, #fff3a0 50%, #ffcc00 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 80%);
            z-index: -1;
        }

        header { margin-top: 40px; text-align: center; }
        h1 {
            font-family: 'Cinzel', serif; font-size: 3.5rem; margin: 0;
            background: var(--premium-gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.3));
        }

        .stage {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 20px; margin: 50px 0; width: 95%; max-width: 1100px;
        }

        .throne {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 30px 15px;
            text-align: center; transition: 0.5s;
            position: relative; flex: 1;
        }

        /* --- RANK 1 PREMIUM FRAME --- */
        .rank-1 { 
            height: 450px; order: 2; z-index: 2; 
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        }

        /* Image/Logo Container */
        .logo-box {
            width: 150px; height: 150px;
            margin: 0 auto 20px;
            border-radius: 20px;
            border: 2px dashed var(--gold);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            cursor: pointer; background: #111;
        }

        .logo-box img {
            width: 100%; height: 100%;
            object-fit: cover; display: none;
        }

        .upload-hint { font-size: 12px; color: var(--gold); font-weight: 600; }

        /* Nexus Style Name */
        .nexus-title {
            font-family: 'Cinzel', serif; font-weight: 900;
            font-size: 38px !important;
            background: var(--premium-gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--gold));
            margin-bottom: 10px;
        }

        .spikes {
            width: 100%; max-width: 280px; margin-top: -10px;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .claim-btn {
            background: var(--premium-gold); color: #000; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: 900;
            cursor: pointer; margin-top: 15px;
        }

        /* Grid Slots */
        .members-section { width: 90%; max-width: 1100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 50px; }
        .slot { background: var(--glass); padding: 15px; border-radius: 15px; text-align: center; color: #555; }

        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0a; padding: 40px; border-radius: 25px; border: 1px solid var(--gold);
            z-index: 1000; text-align: center;
        }
        input[type="text"] { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 80%; border-radius: 5px; }

        @media (max-width: 768px) {
            .stage { flex-direction: column; align-items: center; }
            .throne { width: 90%; height: auto !important; margin-bottom: 20px;}
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="color: var(--gold); letter-spacing: 5px; font-size: 14px;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3">
            <span style="font-size: 40px;">🥉</span>
            <div style="font-family: 'Cinzel'; margin: 20px 0;" id="name3">EMPTY</div>
            <button class="claim-btn" onclick="openPopup(3)">CLAIM</button>
        </div>

        <div class="throne rank-1">
            <span style="font-size: 50px;">👑</span>
            
            <div class="logo-box" onclick="triggerUpload()">
                <span class="upload-hint" id="hint-text">CLICK TO UPLOAD LOGO</span>
                <img id="king-logo-preview" src="" alt="Logo">
                <input type="file" id="logo-input" hidden accept="image/*" onchange="previewLogo(event)">
            </div>

            <div class="nexus-title" id="name1">SUPREME KING</div>
            
            <svg class="spikes" viewBox="0 0 320 100">
                <path d="M160,10 L180,40 L160,25 L140,40 Z" fill="white"/>
                <path d="M0,55 L40,45 L60,55 L40,65 Z" fill="white"/>
                <path d="M320,55 L280,45 L260,55 L280,65 Z" fill="white"/>
                <path d="M160,100 L180,70 L160,85 L140,70 Z" fill="white"/>
            </svg>

            <button class="claim-btn" onclick="openPopup(1)">CLAIM VIP</button>
        </div>

        <div class="throne rank-2">
            <span style="font-size: 40px;">🥈</span>
            <div style="font-family: 'Cinzel'; margin: 20px 0;" id="name2">EMPTY</div>
            <button class="claim-btn" onclick="openPopup(2)">CLAIM</button>
        </div>
    </div>

    <div class="members-section">
        <h2 style="font-family: 'Cinzel'; color: var(--gold);">GOLD MEMBERS</h2>
        <div class="grid" id="gold-grid"></div>
    </div>

    <div id="popup">
        <h3 style="font-family: 'Cinzel'; color: var(--gold);">ENTER YOUR NAME</h3>
        <input type="text" id="userName" placeholder="Your Name...">
        <br><br>
        <button class="claim-btn" onclick="saveName()">ASCEND</button>
    </div>

    <script>
        let currentId = 0;

        function triggerUpload() {
            document.getElementById('logo-input').click();
        }

        function previewLogo(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('king-logo-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('hint-text').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        function openPopup(id) {
            currentId = id;
            document.getElementById('popup').style.display = 'block';
        }

        function saveName() {
            let n = document.getElementById('userName').value;
            if(n) {
                document.getElementById('name' + currentId).innerText = n.toUpperCase();
                document.getElementById('popup').style.display = 'none';
            }
        }

        function makeGrid(id, count) {
            let grid = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.innerText = 'SLOT ' + i;
                grid.appendChild(div);
            }
        }
        makeGrid('gold-grid', 10);
    </script>
</body>
</html>
