<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32;
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* --- SAVE BUTTON --- */
        .admin-bar {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            background: #bc1888; padding: 12px 25px; border-radius: 50px;
            cursor: pointer; font-weight: 900; box-shadow: 0 0 20px rgba(188, 24, 136, 0.6);
            transition: 0.3s;
        }
        .admin-bar:hover { transform: scale(1.1); background: #28a745; }

        header { margin-top: 60px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; color: var(--gold); margin: 0; letter-spacing: 8px; }

        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 50px 0; width: 95%; max-width: 1200px; }
        .throne { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 25px 10px; text-align: center; flex: 1; }
        .rank-1 { height: 480px; order: 2; border: 2px solid var(--gold); }
        .rank-2 { height: 380px; order: 1; }
        .rank-3 { height: 380px; order: 3; }

        .photo-box { width: 140px; height: 140px; margin: 15px auto; border: 2px dashed #444; border-radius: 20px; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        .members-section { width: 90%; max-width: 1100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 50px; }
        
        /* SLOT DESIGN */
        .slot { 
            height: 90px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border-radius: 10px;
            font-family: 'Cinzel', serif; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }

        .gold-plate { background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728); color: #3d2b1f; }
        .silver-plate { background: linear-gradient(145deg, #999, #e0e0e0, #777); color: #222; }
        .bronze-plate { background: linear-gradient(145deg, #804a00, #cd7f32, #593300); color: #fff; }

        .slot-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        .slot-text { z-index: 5; width: 100%; text-align: center; outline: none; position: relative; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="admin-bar" onclick="saveAllData()">SAVE & LOCK</div>

    <header>
        <h1 id="site-title" contenteditable="true">THE KINGDOM</h1>
        <p style="color:var(--gold); letter-spacing:5px;">RAGHAV EDITZ SPECIAL</p>
    </header>

    <div class="stage">
        <div class="throne rank-2">
            <span>🥈</span>
            <div class="photo-box" id="box-r2" onclick="triggerFile(this)"><img src="" style="display:none;"><span class="label">UP</span></div>
            <div id="name-r2" contenteditable="true">EMPTY</div>
        </div>
        <div class="throne rank-1">
            <span>👑</span>
            <div class="photo-box" id="box-r1" style="width:160px; height:160px;" onclick="triggerFile(this)"><img src="" style="display:none;"><span class="label">KING LOGO</span></div>
            <div id="name-r1" contenteditable="true" style="font-size:24px; color:var(--gold);">SUPREME KING</div>
        </div>
        <div class="throne rank-3">
            <span>🥉</span>
            <div class="photo-box" id="box-r3" onclick="triggerFile(this)"><img src="" style="display:none;"><span class="label">UP</span></div>
            <div id="name-r3" contenteditable="true">EMPTY</div>
        </div>
    </div>

    <div class="members-section">
        <h2 style="color:var(--gold)">GOLD LINEAGE (10)</h2>
        <div class="grid" id="gold-grid"></div>
        <h2 style="color:var(--silver)">SILVER DYNASTY (15)</h2>
        <div class="grid" id="silver-grid"></div>
        <h2 style="color:var(--bronze)">BRONZE LEGION (20)</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <input type="file" id="master-upload" onchange="processFile(event)">

    <script>
        let activeEl = null;

        function init() {
            createGrid('gold-grid', 10, 'gold-plate');
            createGrid('silver-grid', 15, 'silver-plate');
            createGrid('bronze-grid', 20, 'bronze-plate');
            loadAllData();
        }

        function createGrid(containerId, count, plateClass) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `slot ${plateClass}`;
                div.id = `${containerId}-s${i}`;
                div.innerHTML = `
                    <img class="slot-img" id="img-${div.id}">
                    <div class="slot-text" contenteditable="true" id="txt-${div.id}">PLATE ${i}</div>
                `;
                div.onclick = function(e) {
                    if(e.target.classList.contains('slot-text')) return;
                    activeEl = this;
                    document.getElementById('master-upload').click();
                };
                container.appendChild(div);
            }
        }

        function triggerFile(el) {
            activeEl = el;
            document.getElementById('master-upload').click();
        }

        function processFile(e) {
            const file = e.target.files[0];
            if(!file || !activeEl) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgData = event.target.result;
                let targetImg = activeEl.querySelector('img');
                targetImg.src = imgData;
                targetImg.style.display = 'block';
                
                // Plate fix: Background hide karo agar photo aa gayi
                if(activeEl.classList.contains('slot')) {
                    activeEl.style.background = "black"; 
                }
                if(activeEl.querySelector('.label')) {
                    activeEl.querySelector('.label').style.display = 'none';
                }
            };
            reader.readAsDataURL(file);
        }

        function saveAllData() {
            const kingdomData = { texts: {}, images: {} };

            // Save Texts
            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                kingdomData.texts[el.id] = el.innerText;
            });

            // Save Images
            document.querySelectorAll('img').forEach(img => {
                if(img.src && img.src.startsWith('data:image')) {
                    kingdomData.images[img.id || img.parentElement.id] = img.src;
                }
            });

            localStorage.setItem('KINGDOM_V3_FINAL', JSON.stringify(kingdomData));
            alert("Bhai, Sab Save Ho Gaya! Refresh Karke Check Karlo.");
        }

        function loadAllData() {
            const saved = localStorage.getItem('KINGDOM_V3_FINAL');
            if(!saved) return;
            const data = JSON.parse(saved);

            for(let id in data.texts) {
                const el = document.getElementById(id);
                if(el) el.innerText = data.texts[id];
            }

            for(let id in data.images) {
                let img = document.getElementById(id); // For slot images
                if(!img) {
                    let parent = document.getElementById(id); // For king boxes
                    if(parent) img = parent.querySelector('img');
                }

                if(img) {
                    img.src = data.images[id];
                    img.style.display = 'block';
                    if(img.parentElement.classList.contains('slot')) {
                        img.parentElement.style.background = "black";
                    }
                    if(img.parentElement.querySelector('.label')) {
                        img.parentElement.querySelector('.label').style.display = 'none';
                    }
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
