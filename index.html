<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | MASTER ADMIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- MASTER ADMIN PANEL --- */
        .admin-panel {
            position: fixed; bottom: 20px; right: 20px; z-index: 10000;
            background: #111; border: 2px solid var(--gold); padding: 15px;
            border-radius: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; gap: 10px;
        }
        .admin-btn {
            background: var(--gold); color: #000; border: none; padding: 10px;
            border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 12px;
        }
        .edit-active [contenteditable="true"] { border: 1px dashed var(--gold) !important; background: rgba(255,255,255,0.05); }

        /* --- LAYOUT --- */
        header { margin-top: 50px; text-align: center; }
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 40px 0; width: 95%; }
        
        .throne {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            padding: 20px; text-align: center; flex: 1; transition: 0.3s;
        }
        .rank-1 { border: 2px solid var(--gold); height: 400px; }

        /* --- DYNAMIC SLOTS --- */
        .members-section { width: 90%; max-width: 1100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 40px; }
        
        .slot {
            padding: 15px; border-radius: 8px; text-align: center;
            font-weight: 900; position: relative; cursor: pointer;
            background-size: cover; background-position: center;
        }

        /* Category Styles */
        .gold-plate { background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728); color: #3d2b1f; }
        .silver-plate { background: linear-gradient(145deg, #999, #e0e0e0, #777); color: #222; }
        .bronze-plate { background: linear-gradient(145deg, #804a00, #cd7f32, #593300); color: #fff; }

        .slot-img { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; border-radius: 8px; display: none; z-index: -1; }

        input[type="file"] { display: none; }
    </style>
</head>
<body id="main-body">

    <div class="admin-panel">
        <div style="color:var(--gold); font-size:10px; font-weight:900; text-align:center;">MASTER CONTROL</div>
        <button class="admin-btn" onclick="enableGlobalEdit()">1. EDIT TEXTS/EMOJIS</button>
        <button class="admin-btn" style="background:#fff;" onclick="triggerBulkImage('silver')">2. CHANGE ALL SILVER PHOTOS</button>
        <button class="admin-btn" style="background:#fff;" onclick="triggerBulkImage('gold')">3. CHANGE ALL GOLD PHOTOS</button>
        <button class="admin-btn" style="background:#00ff00;" onclick="saveAll()">4. SAVE SETTINGS</button>
    </div>

    <header>
        <h1 id="title" contenteditable="false">THE KINGDOM</h1>
        <p id="tagline" contenteditable="false" style="color:var(--gold); letter-spacing:5px;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3"><span contenteditable="false">🥉</span><div contenteditable="false">EMPTY</div></div>
        
        <div class="throne rank-1">
            <span contenteditable="false">👑</span>
            <div id="king-photo-box" onclick="uploadSingle(this)" style="width:120px; height:120px; border:2px dashed var(--gold); margin:15px auto; cursor:pointer; overflow:hidden;">
                <img src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span style="font-size:10px; color:var(--gold);">UPLOAD KING LOGO</span>
            </div>
            <div id="king-name" contenteditable="false" class="nexus-title" style="font-size:30px; font-family:'Cinzel';">SUPREME KING</div>
        </div>

        <div class="throne rank-2"><span contenteditable="false">🥈</span><div contenteditable="false">EMPTY</div></div>
    </div>

    <div class="members-section">
        <h2 contenteditable="false" style="color:var(--gold);">GOLD PLATES</h2>
        <div class="grid" id="gold-grid"></div>

        <h2 contenteditable="false" style="color:var(--silver);">SILVER PLATES</h2>
        <div class="grid" id="silver-grid"></div>
    </div>

    <input type="file" id="bulk-input" accept="image/*" onchange="applyBulkImage(event)">
    <input type="file" id="single-input" accept="image/*" onchange="applySingleImage(event)">

    <script>
        let currentBulkType = '';
        let currentSingleTarget = null;

        function enableGlobalEdit() {
            document.body.classList.add('edit-active');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "true");
            alert("Editing Enabled! Ab tum text aur emojis badal sakte ho.");
        }

        function saveAll() {
            document.body.classList.remove('edit-active');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "false");
            alert("Changes Optimized!");
        }

        // --- IMAGE SYSTEM ---

        function triggerBulkImage(type) {
            currentBulkType = type;
            document.getElementById('bulk-input').click();
        }

        function applyBulkImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const plates = document.querySelectorAll(`.${currentBulkType}-plate`);
                plates.forEach(p => {
                    p.style.backgroundImage = `url('${e.target.result}')`;
                    p.style.color = "transparent"; // Text chhupane ke liye agar photo lagayi hai
                });
            }
            reader.readAsDataURL(file);
        }

        function uploadSingle(target) {
            currentSingleTarget = target;
            document.getElementById('single-input').click();
        }

        function applySingleImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = currentSingleTarget.querySelector('img');
                const span = currentSingleTarget.querySelector('span');
                if(img) {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(span) span.style.display = 'none';
                } else {
                    currentSingleTarget.style.backgroundImage = `url('${e.target.result}')`;
                }
            }
            reader.readAsDataURL(file);
        }

        function makeGrid(id, count, type) {
            let grid = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                let div = document.createElement('div');
                div.className = `slot ${type}-plate`;
                div.setAttribute('onclick', 'uploadSingle(this)');
                div.innerHTML = `<span contenteditable="false">SLOT ${i}</span>`;
                grid.appendChild(div);
            }
        }

        makeGrid('gold-grid', 10, 'gold');
        makeGrid('silver-grid', 15, 'silver');
    </script>
</body>
</html>
