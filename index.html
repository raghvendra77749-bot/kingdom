<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            /* Dark Premium Texture */
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* --- GLOWING BACKGROUND ANIMATION --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.2; z-index: -1;
        }

        .admin-bar {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            background: linear-gradient(90deg, #bc1888, #96166d); padding: 12px 25px; 
            border-radius: 50px; cursor: pointer; font-weight: 900; box-shadow: 0 0 20px rgba(188, 24, 136, 0.6);
        }

        header { margin-top: 60px; text-align: center; }
        h1 { 
            font-family: 'Cinzel', serif; font-size: 4rem; color: var(--gold); margin: 0; 
            text-shadow: 0 0 30px rgba(255,204,0,0.6); letter-spacing: 10px;
        }

        /* --- KING STAGE --- */
        .stage { 
            display: flex; align-items: flex-end; justify-content: center; 
            gap: 30px; margin: 50px 0; width: 95%; max-width: 1200px; 
        }
        .throne { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; 
            padding: 30px 15px; text-align: center; flex: 1; transition: 0.4s;
        }
        .rank-1 { height: 500px; order: 2; border: 2px solid var(--gold); box-shadow: 0 0 50px rgba(255,204,0,0.3); }
        .rank-2 { height: 400px; order: 1; }
        .rank-3 { height: 400px; order: 3; }

        .photo-box { 
            width: 150px; height: 150px; margin: 15px auto; 
            border: 2px dashed rgba(255,204,0,0.3); border-radius: 20px; overflow: hidden; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; background: #0a0a0a;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- SLOTS SIZES & RATIO FIX --- */
        .members-section { width: 92%; max-width: 1200px; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; margin-bottom: 60px; 
        }
        
        .slot { 
            aspect-ratio: 3/1; /* Yaha 3:1 ratio fix hai */
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; transition: 0.3s;
            background-size: 100% 100%; /* Image poore slot pe chipak jayegi */
            background-repeat: no-repeat; background-position: center;
            font-family: 'Cinzel', serif; font-size: 14px;
        }
        .slot:hover { transform: scale(1.05); filter: brightness(1.2); }

        .gold-plate { background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728); color: #3d2b1f; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .silver-plate { background: linear-gradient(145deg, #999, #e0e0e0, #777); color: #222; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .bronze-plate { background: linear-gradient(145deg, #804a00, #cd7f32, #593300); color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="admin-bar" onclick="toggleEdit()">ENABLE MASTER EDIT</div>

    <header>
        <h1 contenteditable="false">THE KINGDOM</h1>
        <p style="color:var(--gold); letter-spacing:12px; font-weight:300;">PREMIUM EDITING SYNDICATE</p>
    </header>

    <div class="stage">
        <div class="throne rank-2">
            <span style="font-size:40px;">🥈</span>
            <div class="photo-box" onclick="triggerFile(this)"><img src="" style="display:none;"><span style="color:#444">UPLOAD</span></div>
            <div contenteditable="false" style="font-family:'Cinzel';">EMPTY</div>
        </div>

        <div class="throne rank-1">
            <span style="font-size:60px;">👑</span>
            <div class="photo-box" style="width:180px; height:180px;" onclick="triggerFile(this)">
                <img src="" style="display:none;">
                <span style="color:var(--gold); font-size:12px;">KING LOGO</span>
            </div>
            <div contenteditable="false" style="font-family:'Cinzel'; font-size:32px; color:var(--gold); text-shadow: 0 0 10px var(--gold);">SUPREME KING</div>
        </div>

        <div class="throne rank-3">
            <span style="font-size:40px;">🥉</span>
            <div class="photo-box" onclick="triggerFile(this)"><img src="" style="display:none;"><span style="color:#444">UPLOAD</span></div>
            <div contenteditable="false" style="font-family:'Cinzel';">EMPTY</div>
        </div>
    </div>

    <div class="members-section">
        <h2 style="color:var(--gold); border-left: 5px solid var(--gold); padding-left: 15px;">GOLD LINEAGE (20 SLOTS)</h2>
        <div class="grid" id="gold-grid"></div>

        <h2 style="color:var(--silver); border-left: 5px solid var(--silver); padding-left: 15px;">SILVER DYNASTY (20 SLOTS)</h2>
        <div class="grid" id="silver-grid"></div>

        <h2 style="color:var(--bronze); border-left: 5px solid var(--bronze); padding-left: 15px;">BRONZE LEGION (20 SLOTS)</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <input type="file" id="master-upload" onchange="processFile(event)">

    <script>
        let isEdit = false;
        let activeEl = null;

        function toggleEdit() {
            isEdit = !isEdit;
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = isEdit);
            document.querySelector('.admin-bar').innerText = isEdit ? "SAVE CHANGES" : "ENABLE MASTER EDIT";
            document.querySelector('.admin-bar').style.background = isEdit ? "#28a745" : "#bc1888";
        }

        function triggerFile(el) {
            activeEl = el;
            document.getElementById('master-upload').click();
        }

        function processFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                if(activeEl.classList.contains('photo-box')) {
                    const img = activeEl.querySelector('img');
                    img.src = event.target.result;
                    img.style.display = 'block';
                    activeEl.querySelector('span').style.display = 'none';
                } else {
                    activeEl.style.backgroundImage = `url('${event.target.result}')`;
                    activeEl.innerText = ""; // Image aate hi text clear
                }
            };
            reader.readAsDataURL(file);
        }

        function createSlots(id, count, plateClass) {
            const container = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `slot ${plateClass}`;
                div.innerText = `PLATE ${i}`;
                div.onclick = function() { triggerFile(this); };
                container.appendChild(div);
            }
        }

        // Slots sankhya badha di gayi hai
        createSlots('gold-grid', 20, 'gold-plate');
        createSlots('silver-grid', 20, 'silver-plate');
        createSlots('bronze-grid', 20, 'bronze-plate');
    </script>
</body>
</html>
