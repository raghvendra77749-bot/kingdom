<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | ROYAL EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
            --premium-gold: linear-gradient(135deg, #ffcc00 0%, #fff3a0 50%, #ffcc00 100%);
            --premium-silver: linear-gradient(135deg, #999 0%, #fff 50%, #999 100%);
            --glass: rgba(255, 255, 255, 0.05);
            /* New variable for Rank 1 metal logo glow */
            --logo-metal-glow: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 80%);
            z-index: -1;
        }

        header { margin-top: 60px; text-align: center; }
        h1 {
            font-family: 'Cinzel', serif; font-size: 3.5rem; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.4));
            letter-spacing: 5px;
        }

        /* Kings Stage */
        .stage {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 20px; margin: 60px 0; width: 95%; max-width: 1100px;
        }

        .throne {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 30px;
            text-align: center; transition: 0.5s;
            position: relative; flex: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .throne:hover { transform: translateY(-15px); border-color: var(--gold); }

        .rank-1 { height: 380px; order: 2; border-color: var(--gold); }
        .rank-2 { height: 300px; order: 3; }
        .rank-3 { height: 300px; order: 1; }

        /* --- RANK 1: Metal Logo Style Updates --- */
        
        /* Continer that houses the name and the symmetry spikes */
        .king-plate {
            display: inline-block;
            position: relative;
            margin: 15px auto;
        }

        /* Unique Rank 1 Name Style - heavy metal feel */
        .king-name-logo {
            font-family: 'Cinzel', serif;
            font-size: 3rem; /* Extra heavy font weight, like logo */
            font-weight: 900;
            color: #fff;
            margin: 0;
            letter-spacing: 2px;
            /* White text with Golden Outer glow */
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8), 0 0 30px rgba(255, 204, 0, 0.5);
        }

        /* SVG based symmetrical tribal spikes around the name */
        .logo-spikes {
            width: 100%;
            max-width: 300px; /* Wider spikes to surround name */
            height: auto;
            display: block;
            margin: 0 auto;
            fill: #fff;
            filter: drop-shadow(0 0 15px var(--gold)); /* White spikes with Golden glow */
            /* Absolute centering logic */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1; /* Behind name */
        }
        
        .supreme-king-title {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: -10px; margin-bottom: 20px;
        }

        /* Central spike element (optional, SVG already has them) */
        /* .central-spike {
            position: absolute;
            top: 0; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem; color: #fff;
            filter: drop-shadow(0 0 10px var(--gold));
        } */

        /* Standard King Names */
        .king-name-std { font-family: 'Cinzel'; font-size: 20px; color: #fff; margin: 15px 0; }
        
        .claim-btn {
            background: var(--gold); color: #000; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .claim-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }

        /* DP Placeholder (Simple Circle) */
        .dp-circle {
            width: 80px; height: 80px; background: #111;
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #333;
        }

        /* Grid Categories */
        .members-section { width: 90%; max-width: 1100px; margin-top: 50px; }
        .cat-title { font-family: 'Cinzel'; color: var(--gold); border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 50px; }
        .slot {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px; text-align: center; font-size: 14px;
            color: #666; transition: 0.3s; cursor: pointer;
        }
        .slot:hover { border-color: #fff; color: #fff; transform: scale(1.05); }

        /* Popup */
        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--gold);
            z-index: 1000; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 100%; margin: 20px 0; }

        @media (max-width: 768px) {
            .stage { flex-direction: column; align-items: center; }
            .throne { width: 90%; height: auto !important; order: unset !important; margin-bottom: 20px; }
            .king-name-logo { font-size: 2.2rem; }
            .supreme-king-title { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="letter-spacing: 10px; font-size: 12px; color: #555;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3" id="t3">
            <span style="font-size: 40px;">🥉</span>
            <div class="dp-circle"><span style="color:#555">DP</span></div>
            <div class="king-name-std" id="name3">EMPTY THRONE</div>
            <button class="claim-btn" onclick="openPopup(3)">CLAIM (FREE)</button>
        </div>

        <div class="throne rank-1" id="t1">
            <span style="font-size: 60px;">👑</span>
            <div class="dp-circle"><span style="color:#555">DP</span></div>
            
            <div class="king-plate" id="name1-plate">
                <div class="king-name-logo" id="name1">ANAND GFX</div>
                
                <svg class="logo-spikes" viewBox="0 0 320 120">
                    <path d="M160,0 L200,40 L160,20 L120,40 Z" /> <path d="M160,120 L200,80 L160,100 L120,80 Z" /> <path d="M0,60 L40,40 L60,60 L40,80 Z" /> <path d="M320,60 L280,40 L260,60 L280,80 Z" /> <path d="M40,20 L80,0 L60,20 Z" /> <path d="M280,20 L240,0 L260,20 Z" /> <path d="M40,100 L80,120 L60,100 Z" /> <path d="M280,100 L240,120 L260,100 Z" /> </svg>
            </div>
            
            <div class="supreme-king-title">SUPREME KING</div>
            <button class="claim-btn" onclick="openPopup(1)">CLAIM (FREE)</button>
        </div>

        <div class="throne rank-2" id="t2">
            <span style="font-size: 40px;">🥈</span>
            <div class="dp-circle"><span style="color:#555">DP</span></div>
            <div class="king-name-std" id="name2">EMPTY THRONE</div>
            <button class="claim-btn" onclick="openPopup(1)">CLAIM (FREE)</button> </div>
    </div>

    <div class="members-section">
        <h2 class="cat-title">GOLD MEMBERS (10 SLOTS)</h2>
        <div class="grid" id="gold-grid"></div>

        <h2 class="cat-title" style="color: var(--silver);">SILVER MEMBERS (15 SLOTS)</h2>
        <div class="grid" id="silver-grid"></div>

        <h2 class="cat-title" style="color: var(--bronze);">BRONZE MEMBERS (20 SLOTS)</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <div id="popup">
        <h3 style="font-family: 'Cinzel';">ENTER YOUR NAME</h3>
        <input type="text" id="userName" placeholder="Your Name...">
        <button class="claim-btn" onclick="saveToDatabase()">BETH JAO RAJA!</button>
    </div>

    <script>
        // APNA FIREBASE CONFIG YAHAN PASTE KARO (FREE database ke liye)
        const firebaseConfig = { apiKey: "...", databaseURL: "..." }; 
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let targetId = 0;

        // Syncing from Database
        database.ref('kings').on('value', (snap) => {
            const val = snap.val();
            if(val) {
                document.getElementById('name1').innerText = val.name1 || "ANAND GFX";
                document.getElementById('name2').innerText = val.name2 || "EMPTY THRONE";
                document.getElementById('name3').innerText = val.name3 || "EMPTY THRONE";
            } else {
                // Default if empty database
                document.getElementById('name1').innerText = "ANAND GFX";
                document.getElementById('name2').innerText = "EMPTY THRONE";
                document.getElementById('name3').innerText = "EMPTY THRONE";
            }
        });

        function openPopup(id) {
            targetId = id;
            document.getElementById('popup').style.display = 'block';
        }

        function saveToDatabase() {
            let name = document.getElementById('userName').value.toUpperCase();
            if(!name) return alert("Bina naam ke raja nahi banoge!");

            database.ref('kings/name' + targetId).set(name)
            .then(() => {
                document.getElementById('popup').style.display = 'none';
                document.getElementById('userName').value = "";
            });
        }

        // Generate Grid Slots
        function makeGrid(id, count) {
            let grid = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.innerText = 'SLOT ' + i;
                div.onclick = function() {
                    let n = prompt("Enter Name for Slot " + i);
                    if(n) this.innerText = n.toUpperCase();
                };
                grid.appendChild(div);
            }
        }

        makeGrid('gold-grid', 10);
        makeGrid('silver-grid', 15);
        makeGrid('bronze-grid', 20);
    </script>
</body>
</html>
