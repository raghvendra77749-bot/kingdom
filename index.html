<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kingdom - Slots</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .tier-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
        .tier { border: 2px solid #444; padding: 15px; border-radius: 10px; width: 250px; }
        .gold { border-color: gold; }
        .silver { border-color: silver; }
        .bronze { border-color: #cd7f32; }
        .slot { background: #222; margin: 5px; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; }
        input { background: #333; color: white; border: 1px solid #555; border-radius: 3px; padding: 2px 5px; width: 120px; }
        
        /* Admin buttons jo shuru me hidden rahenge */
        .admin-btn { display: none; margin-top: 10px; padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; }
        .save-btn { background: #28a745; color: white; }
        .edit-mode .admin-btn { display: inline-block; }
        .edit-mode input { border-color: #007bff; }
    </style>
</head>
<body class="">

    <h1>THE KINGDOM</h1>
    <p id="status-msg">Press Alt + L to Edit (Admin Only)</p>

    <div class="tier-container">
        <div class="tier gold">
            <h2>GOLD (10 Slots)</h2>
            <div id="gold-slots"></div>
        </div>

        <div class="tier silver">
            <h2>SILVER (15 Slots)</h2>
            <div id="silver-slots"></div>
        </div>

        <div class="tier bronze">
            <h2>BRONZE (20 Slots)</h2>
            <div id="bronze-slots"></div>
        </div>
    </div>

    <button class="admin-btn save-btn" onclick="saveData()">SAVE ALL CHANGES</button>

    <script>
        const tiers = {
            gold: { count: 10, id: "gold-slots" },
            silver: { count: 15, id: "silver-slots" },
            bronze: { count: 20, id: "bronze-slots" }
        };

        // Slots generate karne ka function
        function createSlots() {
            const savedData = JSON.parse(localStorage.getItem('kingdomData')) || {};

            for (let tier in tiers) {
                const container = document.getElementById(tiers[tier].id);
                for (let i = 1; i <= tiers[tier].count; i++) {
                    const slotId = `${tier}-${i}`;
                    const val = savedData[slotId] || "";
                    container.innerHTML += `
                        <div class="slot">
                            <span>#${i}</span>
                            <input type="text" id="${slotId}" value="${val}" placeholder="Empty">
                        </div>
                    `;
                }
            }
        }

        // Save function (Abhi localStorage me save hoga, baad me Firebase se connect karenge)
        function saveData() {
            const data = {};
            document.querySelectorAll('input').forEach(input => {
                data[input.id] = input.value;
            });
            localStorage.setItem('kingdomData', JSON.stringify(data));
            alert("Sab kuch save ho gaya hai!");
            document.body.classList.remove('edit-mode');
            document.getElementById('status-msg').innerText = "Changes Saved. Admin Mode Closed.";
        }

        // Secret Shortcut (Alt + L) to enable Edit Mode
        window.addEventListener('keydown', function(e) {
            if (e.altKey && e.key.toLowerCase() === 'l') {
                document.body.classList.toggle('edit-mode');
                const isEdit = document.body.classList.contains('edit-mode');
                document.getElementById('status-msg').innerText = isEdit ? "ADMIN MODE: ON" : "Press Alt + L to Edit";
            }
        });

        createSlots();
    </script>
</body>
</html>
