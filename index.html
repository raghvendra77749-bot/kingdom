<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | ANAND GFX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32;
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Outfit', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Animated Glowing Background */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #222 0%, #000 70%);
            z-index: -1;
        }

        header { margin-top: 60px; text-align: center; }
        h1 {
            font-family: 'Cinzel', serif; font-size: 4rem; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.4));
            letter-spacing: 5px;
        }

        /* Kings Stage */
        .stage {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 20px; margin: 60px 0; width: 95%; max-width: 1100px;
        }

        .throne {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 30px;
            text-align: center; transition: 0.5s;
            position: relative; flex: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .throne:hover { transform: translateY(-15px); border-color: var(--gold); }

        .rank-1 { height: 380px; order: 2; box-shadow: 0 0 40px rgba(255, 204, 0, 0.15); border-width: 2px; }
        .rank-2 { height: 300px; order: 3; }
        .rank-3 { height: 300px; order: 1; }

        .king-name { font-family: 'Cinzel'; font-size: 22px; color: #fff; margin: 15px 0; }
        .claim-btn {
            background: var(--gold); color: #000; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
        }
        .claim-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }

        /* Grid Categories */
        .members-section { width: 90%; max-width: 1100px; margin-top: 50px; }
        .cat-title { font-family: 'Cinzel'; color: var(--gold); border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 50px; }
        .slot {
            background: #111; border: 1px solid #222; padding: 15px;
            border-radius: 15px; text-align: center; font-size: 14px;
            color: #666; transition: 0.3s; cursor: pointer;
        }
        .slot:hover { border-color: #fff; color: #fff; }

        /* Popup */
        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--gold);
            z-index: 100; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 100%; margin: 20px 0; }

        @media (max-width: 768px) {
            .stage { flex-direction: column; align-items: center; }
            .throne { width: 90%; height: auto !important; order: unset !important; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="letter-spacing: 10px; font-size: 12px; color: #555;">ROYAL BLOODLINE 2026</p>
    </header>

    <div class="stage">
        <div class="throne rank-3" id="t3">
            <span style="font-size: 40px;">🥉</span>
            <div class="king-name" id="name3">EMPTY THRONE</div>
            <button class="claim-btn" onclick="openPopup(3)">CLAIM (FREE)</button>
        </div>

        <div class="throne rank-1" id="t1">
            <span style="font-size: 60px;">👑</span>
            <div class="king-name" id="name1" style="font-size: 30px;">SUPREME KING</div>
            <button class="claim-btn" onclick="openPopup(1)">CLAIM (FREE)</button>
        </div>

        <div class="throne rank-2" id="t2">
            <span style="font-size: 40px;">🥈</span>
            <div class="king-name" id="name2">EMPTY THRONE</div>
            <button class="claim-btn" onclick="openPopup(2)">CLAIM (FREE)</button>
        </div>
    </div>

    <div class="members-section">
        <h2 class="cat-title">GOLD MEMBERS (10 SLOTS)</h2>
        <div class="grid" id="gold-grid"></div>

        <h2 class="cat-title" style="color: var(--silver);">SILVER MEMBERS (15 SLOTS)</h2>
        <div class="grid" id="silver-grid"></div>

        <h2 class="cat-title" style="color: var(--bronze);">BRONZE MEMBERS (20 SLOTS)</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <div id="popup">
        <h3 style="font-family: 'Cinzel';">ENTER YOUR NAME</h3>
        <input type="text" id="userName" placeholder="Your Name...">
        <button class="claim-btn" onclick="saveName()">BETH JAO RAJA!</button>
    </div>

    <script>
        let currentThrone = 0;

        function openPopup(id) {
            currentThrone = id;
            document.getElementById('popup').style.display = 'block';
        }

        function saveName() {
            let name = document.getElementById('userName').value;
            if(!name) return alert("Bina naam ke raja nahi banoge!");
            
            document.getElementById('name' + currentThrone).innerText = name.toUpperCase();
            document.getElementById('popup').style.display = 'none';
            document.getElementById('userName').value = "";
        }

        // Generate Grid Slots
        function makeGrid(id, count) {
            let grid = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.innerText = 'SLOT ' + i;
                div.onclick = function() {
                    let n = prompt("Enter Name for Slot " + i);
                    if(n) this.innerText = n.toUpperCase();
                };
                grid.appendChild(div);
            }
        }

        makeGrid('gold-grid', 10);
        makeGrid('silver-grid', 15);
        makeGrid('bronze-grid', 20);
    </script>
</body>
</html>
